name: Daily Quiz Shorts Generator (Node.js/TS + Python)

on:
  schedule:
    - cron: '0 */1 * * *' # Altere para rodar a cada 1 hora
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: gemma3:1b # Definido globalmente para consistência do cache

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libass-dev ttf-mscorefonts-installer
        sudo fc-cache -f -v

    - name: Verify FFmpeg
      run: ffmpeg -version

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Restore Ollama Models Cache
      id: cache-ollama
      uses: actions/cache/restore@v4
      with:
        path: /home/runner/.ollama/models
        key: ollama-models-${{ env.OLLAMA_MODEL }}

    - name: Setup Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve > /tmp/ollama.log 2>&1 &
        echo $! > /tmp/ollama.pid
        sleep 10
        if [ "${{ steps.cache-ollama.outputs.cache-hit }}" != 'true' ]; then
          ollama pull ${{ env.OLLAMA_MODEL }}
        fi
        ollama list

    - name: Install Project Dependencies
      run: pnpm install

    - name: Create Required Folders
      run: mkdir -p assets/backgrounds assets/music assets/fonts assets/logo temp_assets output

    - name: Run Quiz Generator
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        OLLAMA_MODEL: ${{ env.OLLAMA_MODEL }}
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        YOUTUBE_CHANNEL_NAME: ${{ secrets.YOUTUBE_CHANNEL_NAME }}
      run: |
        pnpm run generate-daily

    - name: Stop Ollama
      if: always()
      run: |
        if [ -f /tmp/ollama.pid ]; then
          kill "$(cat /tmp/ollama.pid)" || true
        fi
        pkill -f "ollama serve" || true

    - name: Save Ollama Models Cache
      if: always() && steps.cache-ollama.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /home/runner/.ollama/models
        key: ollama-models-${{ env.OLLAMA_MODEL }}

    - name: Upload Generated Shorts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-quiz-shorts
        path: output/short_*.mp4
        retention-days: 7
