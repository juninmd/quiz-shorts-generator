name: Daily Quiz Shorts Generator (Node.js/TS + Python)

on:
  schedule:
    - cron: '0 */1 * * *' # Altere para rodar a cada 1 hora
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OLLAMA_MODELS_DIR: /home/runner/.ollama/models
      OLLAMA_MODEL: qwen3:1.7b # Definido globalmente para consistência do cache

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libass-dev # ffmpeg já é pré-instalado
        sudo fc-cache -f -v

    - name: Verify FFmpeg
      run: ffmpeg -version

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Cache Ollama Models
      id: cache-ollama
      uses: actions/cache@v4
      with:
        path: /home/runner/.ollama/models
        key: ollama-models-${{ env.OLLAMA_MODEL }}

    - name: Setup Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 10
        if [ "${{ steps.cache-ollama.outputs.cache-hit }}" != 'true' ]; then
          ollama pull ${{ env.OLLAMA_MODEL }}
        fi
        ollama list

    - name: Install Project Dependencies
      run: pnpm install

    - name: Create Required Folders
      run: mkdir -p assets/backgrounds assets/music assets/fonts temp_assets

    - name: Run Quiz Generator
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
      run: |
        pnpm start

    - name: Upload Video Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-quiz-video
        path: quiz_*.mp4
        retention-days: 1
