name: Daily Quiz Shorts Generator (Node.js/TS + Python)

on:
  schedule:
    - cron: '0 */1 * * *' # Altere para rodar a cada 1 hora
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libass-dev ttf-mscorefonts-installer
        sudo fc-cache -f -v

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install Project Dependencies
      run: pnpm install

    - name: Create Required Folders
      run: mkdir -p assets/backgrounds assets/music assets/fonts temp_assets

    - name: Run Quiz Generator
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
      run: |
        pnpm start

    - name: Upload Video Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-quiz-video
        path: quiz_*.mp4
        retention-days: 1
