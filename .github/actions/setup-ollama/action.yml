name: 'Setup Ollama with Model'
description: 'Instala Ollama, aguarda inicialização, pulls modelo e configura cache'

inputs:
  model:
    description: 'Nome do modelo Ollama a usar (ex: gemma3:1b, llama2, etc)'
    required: true
  ollama-host:
    description: 'Host do Ollama (padrão: http://localhost:11434)'
    required: false
    default: 'http://localhost:11434'
  wait-timeout:
    description: 'Timeout máximo para Ollama ficar pronto, em segundos'
    required: false
    default: '180'
  pull-timeout:
    description: 'Timeout máximo para fazer pull do modelo, em minutos'
    required: false
    default: '15'
  cache-enabled:
    description: 'Habilitar cache de modelos (true/false)'
    required: false
    default: 'true'

outputs:
  ollama-ready:
    description: 'Booleano indicando se Ollama está pronto'
    value: ${{ steps.ollama-ready.outputs.ready }}
  model-cached:
    description: 'Booleano indicando se modelo veio do cache'
    value: ${{ steps.cache-restore.outputs.cache-hit }}

runs:
  using: 'composite'

  steps:
    - name: Restore Ollama Models Cache
      if: inputs.cache-enabled == 'true'
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: /home/runner/.ollama/models
        key: ollama-models-${{ inputs.model }}

    - name: Install Ollama
      shell: bash
      run: |
        echo "📥 Instalando Ollama..."
        curl -fsSL https://ollama.com/install.sh | sh
        echo "✅ Ollama instalado"

        echo "🛑 Parando serviço systemd do Ollama (se estiver rodando)..."
        pkill -f "ollama serve" || true
        sudo systemctl stop ollama 2>/dev/null || true
        sleep 2
        echo "✅ Serviço parado"

    - name: Start Ollama Service
      shell: bash
      env:
        OLLAMA_HOST: ${{ inputs.ollama-host }}
      run: |
        echo "🚀 Iniciando serviço Ollama em $OLLAMA_HOST..."
        mkdir -p /home/runner/.ollama/models
        export OLLAMA_HOST="$OLLAMA_HOST"
        nohup ollama serve > /tmp/ollama.log 2>&1 &
        OLLAMA_PID=$!
        echo $OLLAMA_PID > /tmp/ollama.pid
        sleep 5
        if ! kill -0 $OLLAMA_PID 2>/dev/null; then
          echo "❌ Ollama falhou ao iniciar"
          cat /tmp/ollama.log
          exit 1
        fi
        echo "✅ Ollama iniciado (PID: $OLLAMA_PID)"

    - name: Wait for Ollama Ready
      id: ollama-ready
      shell: bash
      env:
        OLLAMA_HOST: ${{ inputs.ollama-host }}
      run: |
        TIMEOUT=${{ inputs.wait-timeout }}
        echo "⏳ Aguardando Ollama estar pronto (máximo ${TIMEOUT}s)..."
        for i in $(seq 1 $TIMEOUT); do
          if curl -s "$OLLAMA_HOST/api/tags" > /dev/null 2>&1; then
            echo "✅ Ollama está pronto! (${i}s)"
            echo "ready=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ $((i % 20)) -eq 0 ]; then
            echo "  ⏳ Aguardando... $((TIMEOUT - i))s restantes"
          fi
          sleep 1
        done
        echo "❌ Timeout: Ollama não respondeu"
        tail -30 /tmp/ollama.log || true
        echo "ready=false" >> $GITHUB_OUTPUT
        exit 1

    - name: Pull Ollama Model
      shell: bash
      env:
        OLLAMA_HOST: ${{ inputs.ollama-host }}
      run: |
        TIMEOUT_MINS=${{ inputs.pull-timeout }}
        TIMEOUT_SECS=$((TIMEOUT_MINS * 60))
        if [ "${{ steps.cache-restore.outputs.cache-hit }}" == 'true' ]; then
          echo "📦 Modelo ${{ inputs.model }} do cache"
        else
          echo "📥 Puxando modelo (timeout: ${TIMEOUT_MINS}m)..."
          timeout $TIMEOUT_SECS ollama pull "${{ inputs.model }}" || exit 1
        fi
        echo "⏳ Verificando disponibilidade..."
        for i in $(seq 1 30); do
          if timeout 5 ollama list | grep -q "${{ inputs.model }}"; then
            echo "✅ Modelo disponível!"
            exit 0
          fi
          sleep 1
        done
        echo "❌ Modelo não ficou disponível"
        ollama list || true
        exit 1

    - name: List Ollama Models
      shell: bash
      env:
        OLLAMA_HOST: ${{ inputs.ollama-host }}
      run: |
        echo "📋 Modelos disponíveis:"
        ollama list
        echo "✅ Setup concluído!"

    - name: Setup Cleanup Hook
      shell: bash
      run: |
        echo "${{ inputs.model }}" > /tmp/ollama-model.txt
